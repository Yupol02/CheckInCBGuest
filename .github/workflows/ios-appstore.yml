name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  BUNDLE_ID: com.checkingcbguests.CheckingCBGuestsI-os
  DEVELOPMENT_TEAM: 46W827A36A

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import code signing certificate
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Download App Store provisioning profile
        id: provisioning
        uses: Apple-Actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Prepare signing configuration
        id: signing
        env:
          PROFILES_JSON: ${{ steps.provisioning.outputs.profiles }}
        run: |
          set -euo pipefail
          echo "Downloaded profiles: $PROFILES_JSON"
          PROFILE_NAME="$(printf '%s' "$PROFILES_JSON" | python3 -c 'import json,sys; data=json.load(sys.stdin); \
            assert data, "No App Store provisioning profile found for bundle id"; \
            print(data[0]["name"])')"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          cat > ios/ExportOptions.ci.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ env.DEVELOPMENT_TEAM }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Build, archive and export IPA
        id: build
        uses: Apple-Actions/xcodebuild@v1
        with:
          project: ${{ env.PROJECT_PATH }}
          scheme: ${{ env.SCHEME }}
          sdk: iphoneos
          destination: generic/platform=iOS
          action: archive
          archive-path: .build/CheckingCBGuests.xcarchive
          export-options-plist: ios/ExportOptions.ci.plist
          build-settings: |
            DEVELOPMENT_TEAM=${{ env.DEVELOPMENT_TEAM }}
            CODE_SIGN_STYLE=Manual
            CODE_SIGN_IDENTITY=Apple Distribution
            PROVISIONING_PROFILE_SPECIFIER=${{ steps.signing.outputs.profile_name }}
          zip-result-bundle: true

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.build.outputs.ipa-path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: .build/*.log
          if-no-files-found: ignore
