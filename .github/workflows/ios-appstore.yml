name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  BUNDLE_ID: com.checkingcbguests.CheckingCBGuestsI-os
  DEVELOPMENT_TEAM: 46W827A36A
  ARCHIVE_PATH: .build/CheckingCBGuests.xcarchive
  EXPORT_PATH: .build/export

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s\n' "$ASC_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ID=$ASC_KEY_ID" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID=$ASC_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Import code signing certificate
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Configure distribution signing on app target
        env:
          PROJECT_PATH: ${{ env.PROJECT_PATH }}
          DEVELOPMENT_TEAM: ${{ env.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          gem install xcodeproj -N
          ruby <<'RUBY'
          require "xcodeproj"

          project = Xcodeproj::Project.open(ENV.fetch("PROJECT_PATH"))
          app_target = project.targets.find { |target| target.product_type == "com.apple.product-type.application" }
          raise "Application target not found" unless app_target

          app_target.build_configurations.each do |config|
            next unless config.name == "Release"

            config.build_settings["CODE_SIGN_STYLE"] = "Automatic"
            config.build_settings["CODE_SIGN_IDENTITY"] = "Apple Distribution"
            config.build_settings["CODE_SIGN_IDENTITY[sdk=iphoneos*]"] = "Apple Distribution"
            config.build_settings["DEVELOPMENT_TEAM"] = ENV.fetch("DEVELOPMENT_TEAM")
            config.build_settings.delete("PROVISIONING_PROFILE")
            config.build_settings.delete("PROVISIONING_PROFILE_SPECIFIER")
          end

          project.save
          RUBY
          echo "Available signing identities:"
          security find-identity -v -p codesigning || true

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Archive app
        id: archive
        run: |
          set -euo pipefail
          mkdir -p .build
          set +e
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            > .build/archive.log 2>&1
          ARCHIVE_EXIT=$?
          set -e
          if [ "$ARCHIVE_EXIT" -ne 0 ]; then
            echo "====== ARCHIVE FAILED (exit $ARCHIVE_EXIT) ======"
            grep -E "error:|warning:|No Accounts|provisioning profile|Signing" .build/archive.log || true
            tail -n 120 .build/archive.log || true
            exit "$ARCHIVE_EXIT"
          fi
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "====== ARCHIVE FAILED: .xcarchive not created ======"
            ls -la .build/ || true
            tail -n 120 .build/archive.log || true
            exit 1
          fi
          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "====== ARCHIVE FAILED: .app not found in archive ======"
            find "$ARCHIVE_PATH" -maxdepth 4 -type d || true
            exit 1
          fi
          echo "Archive signing details:"
          codesign -dvvv "$APP_PATH" 2>&1 | tee .build/codesign.log
          if [ -f "$APP_PATH/embedded.mobileprovision" ]; then
            echo "Embedded provisioning profile:"
            security cms -D -i "$APP_PATH/embedded.mobileprovision" > .build/embedded-profile.plist
            /usr/libexec/PlistBuddy -c 'Print :Name' .build/embedded-profile.plist || true
            /usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' .build/embedded-profile.plist || true
          else
            echo "WARNING: embedded.mobileprovision not found"
          fi
          if ! grep -qi "Authority=Apple Distribution" .build/codesign.log; then
            echo "====== ARCHIVE FAILED: app is not signed with Apple Distribution ======"
            echo "Found signing authorities:"
            grep -i "Authority=" .build/codesign.log || true
            exit 1
          fi
          echo "archive-path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Archive succeeded: $ARCHIVE_PATH"

      - name: Package IPA from archive
        id: export
        run: |
          set -euo pipefail
          ARCHIVE_PATH="${{ steps.archive.outputs.archive-path }}"
          APP_PATH="${{ steps.archive.outputs.app-path }}"
          if [ -z "$ARCHIVE_PATH" ] || [ ! -d "$ARCHIVE_PATH" ]; then
            echo "====== PACKAGE FAILED: archive missing ======"
            exit 1
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -name '*.app' -print -quit)"
          fi
          if [ -z "$APP_PATH" ]; then
            echo "====== PACKAGE FAILED: .app missing ======"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH" > .build/package.log 2>&1
          mkdir -p "$EXPORT_PATH"
          APP_NAME="$(basename "$APP_PATH")"
          IPA_PATH="$EXPORT_PATH/${APP_NAME%.app}.ipa"
          WORKDIR="$(mktemp -d)"
          trap 'rm -rf "$WORKDIR"' EXIT
          mkdir -p "$WORKDIR/Payload"
          ditto "$APP_PATH" "$WORKDIR/Payload/$APP_NAME"
          (
            cd "$WORKDIR"
            zip -yr "$OLDPWD/$IPA_PATH" Payload > "$OLDPWD/.build/zip.log" 2>&1
          )
          if [ ! -f "$IPA_PATH" ]; then
            echo "====== PACKAGE FAILED: IPA not created ======"
            cat .build/zip.log || true
            exit 1
          fi
          echo "ipa-path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Packaged IPA: $IPA_PATH ($(du -h "$IPA_PATH" | awk '{print $1}'))"

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.export.outputs.ipa-path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: .build/
          if-no-files-found: warn
