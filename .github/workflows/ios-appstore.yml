name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  BUNDLE_ID: com.checkingcbguests.CheckingCBGuestsI-os
  DEVELOPMENT_TEAM: 46W827A36A
  ARCHIVE_PATH: .build/CheckingCBGuests.xcarchive
  EXPORT_PATH: .build/export

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s\n' "$ASC_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ID=$ASC_KEY_ID" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID=$ASC_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Import code signing certificate
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Archive app
        id: archive
        run: |
          set -euo pipefail
          mkdir -p .build
          set +e
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Automatic \
            > .build/archive.log 2>&1
          ARCHIVE_EXIT=$?
          set -e
          if [ "$ARCHIVE_EXIT" -ne 0 ]; then
            echo "====== ARCHIVE FAILED (exit $ARCHIVE_EXIT) ======"
            grep -E "error:|warning:|No Accounts|provisioning profile|Signing" .build/archive.log || true
            tail -n 120 .build/archive.log || true
            exit "$ARCHIVE_EXIT"
          fi
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "====== ARCHIVE FAILED: .xcarchive not created ======"
            echo "Expected path: $ARCHIVE_PATH"
            ls -la .build/ || true
            tail -n 120 .build/archive.log || true
            exit 1
          fi
          echo "archive-path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "Archive succeeded: $ARCHIVE_PATH"
          ls -la "$ARCHIVE_PATH"

      - name: Export IPA
        id: export
        run: |
          set -euo pipefail
          ARCHIVE_PATH="${{ steps.archive.outputs.archive-path }}"
          if [ -z "$ARCHIVE_PATH" ] || [ ! -d "$ARCHIVE_PATH" ]; then
            echo "====== EXPORT FAILED: archive missing before export ======"
            echo "archive-path output: ${ARCHIVE_PATH:-<empty>}"
            ls -la .build/ || true
            exit 1
          fi
          mkdir -p "$EXPORT_PATH"
          python3 <<'PY'
          import plistlib
          from pathlib import Path

          data = {
              "method": "app-store-connect",
              "teamID": "46W827A36A",
              "signingStyle": "automatic",
              "uploadSymbols": True,
          }
          Path("ios/ExportOptions.ci.plist").write_bytes(plistlib.dumps(data))
          PY
          set +e
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ios/ExportOptions.ci.plist \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            > .build/export.log 2>&1
          EXPORT_EXIT=$?
          set -e
          if [ "$EXPORT_EXIT" -ne 0 ]; then
            echo "====== EXPORT FAILED (exit $EXPORT_EXIT) ======"
            grep -E "error:|warning:|Signing|provisioning profile" .build/export.log || true
            tail -n 120 .build/export.log || true
            exit "$EXPORT_EXIT"
          fi
          IPA="$(find "$EXPORT_PATH" -name '*.ipa' -print -quit)"
          if [ -z "$IPA" ]; then
            echo "IPA not found under $EXPORT_PATH"
            ls -la "$EXPORT_PATH" || true
            exit 1
          fi
          echo "ipa-path=$IPA" >> "$GITHUB_OUTPUT"
          echo "Exported: $IPA"

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.export.outputs.ipa-path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: .build/
          if-no-files-found: warn
