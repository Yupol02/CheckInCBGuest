name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  BUNDLE_ID: com.checkingcbguests.CheckingCBGuestsI-os
  DEVELOPMENT_TEAM: 46W827A36A

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import code signing certificate
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Download App Store provisioning profile
        id: provisioning
        uses: Apple-Actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Configure signing on app target only
        id: signing
        env:
          PROFILES_JSON: ${{ steps.provisioning.outputs.profiles }}
          PROJECT_PATH: ${{ env.PROJECT_PATH }}
          DEVELOPMENT_TEAM: ${{ env.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          echo "Downloaded profiles: $PROFILES_JSON"
          PROFILE_NAME="$(printf '%s' "$PROFILES_JSON" | python3 -c 'import json,sys; data=json.load(sys.stdin); \
            assert data, "No App Store provisioning profile found for bundle id"; \
            print(data[0]["name"])')"
          PROFILE_UUID="$(printf '%s' "$PROFILES_JSON" | python3 -c 'import json,sys; data=json.load(sys.stdin); \
            assert data, "No App Store provisioning profile found for bundle id"; \
            print(data[0]["udid"])')"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          export PROFILE_NAME PROFILE_UUID
          gem install xcodeproj -N
          ruby <<'RUBY'
          require "xcodeproj"

          project = Xcodeproj::Project.open(ENV.fetch("PROJECT_PATH"))

          project.targets.each do |target|
            target.build_configurations.each do |config|
              if target.product_type == "com.apple.product-type.application"
                config.build_settings["CODE_SIGN_STYLE"] = "Manual"
                config.build_settings["CODE_SIGN_IDENTITY"] = "Apple Distribution"
                config.build_settings["CODE_SIGN_IDENTITY[sdk=iphoneos*]"] = "Apple Distribution"
                config.build_settings["PROVISIONING_PROFILE"] = ENV.fetch("PROFILE_UUID")
                config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ENV.fetch("PROFILE_NAME")
                config.build_settings["DEVELOPMENT_TEAM"] = ENV.fetch("DEVELOPMENT_TEAM")
                config.build_settings["CODE_SIGNING_ALLOWED"] = "YES"
              else
                config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
                config.build_settings.delete("PROVISIONING_PROFILE")
                config.build_settings.delete("PROVISIONING_PROFILE_SPECIFIER")
              end
            end
          end

          project.save
          RUBY
          echo "Installed signing identities:"
          security find-identity -v -p codesigning || true
          echo "Installed provisioning profiles:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Archive app
        id: archive
        run: |
          set -euo pipefail
          mkdir -p .build
          set +e
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ".build/CheckingCBGuests.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            > .build/archive.log 2>&1
          ARCHIVE_EXIT=$?
          set -e
          if [ "$ARCHIVE_EXIT" -ne 0 ]; then
            echo "====== ARCHIVE FAILED (exit $ARCHIVE_EXIT) ======"
            grep -E "error:|warning:|No Accounts|provisioning profile|Signing" .build/archive.log || true
            tail -n 120 .build/archive.log || true
            exit "$ARCHIVE_EXIT"
          fi
          echo "Archive succeeded"

      - name: Export IPA
        id: export
        env:
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
        run: |
          set -euo pipefail
          mkdir -p .build/export
          python3 <<PY
          import os
          import plistlib
          from pathlib import Path

          data = {
              "method": "app-store-connect",
              "teamID": os.environ["DEVELOPMENT_TEAM"],
              "signingStyle": "manual",
              "provisioningProfiles": {
                  os.environ["BUNDLE_ID"]: os.environ["PROFILE_NAME"],
              },
              "uploadSymbols": True,
          }
          Path("ios/ExportOptions.ci.plist").write_bytes(plistlib.dumps(data))
          PY
          set +e
          xcodebuild \
            -exportArchive \
            -archivePath ".build/CheckingCBGuests.xcarchive" \
            -exportPath ".build/export" \
            -exportOptionsPlist ios/ExportOptions.ci.plist \
            > .build/export.log 2>&1
          EXPORT_EXIT=$?
          set -e
          if [ "$EXPORT_EXIT" -ne 0 ]; then
            echo "====== EXPORT FAILED (exit $EXPORT_EXIT) ======"
            grep -E "error:|warning:|Signing|provisioning profile" .build/export.log || true
            tail -n 120 .build/export.log || true
            exit "$EXPORT_EXIT"
          fi
          IPA="$(find .build/export -name '*.ipa' -print -quit)"
          if [ -z "$IPA" ]; then
            echo "IPA not found"
            ls -la .build/export || true
            exit 1
          fi
          echo "ipa-path=$IPA" >> "$GITHUB_OUTPUT"
          echo "Exported: $IPA"

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.export.outputs.ipa-path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: .build/
          if-no-files-found: warn
