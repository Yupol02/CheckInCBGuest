name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  DEVELOPMENT_TEAM: 46W827A36A

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install App Store Connect API key
        uses: apple-actions/import-app-store-connect-api-key@v3
        with:
          key-id: ${{ secrets.ASC_KEY_ID }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: |
          xcodebuild -list -project "$PROJECT_PATH"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Archive
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/CheckingCBGuests.xcarchive" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/CheckingCBGuests.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail
          IPA="$(find "$RUNNER_TEMP/export" -name '*.ipa' -print -quit)"
          if [ -z "$IPA" ]; then
            echo "IPA not found in $RUNNER_TEMP/export"
            ls -la "$RUNNER_TEMP/export" || true
            exit 1
          fi
          echo "Uploading: $IPA"
          xcrun altool --upload-app --type ios --file "$IPA"
