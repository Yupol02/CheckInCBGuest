name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  BUNDLE_ID: com.checkingcbguests.CheckingCBGuestsI-os
  DEVELOPMENT_TEAM: 46W827A36A
  ARCHIVE_PATH: .build/CheckingCBGuests.xcarchive
  EXPORT_PATH: .build/export

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: mkdir -p .build

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate required secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo
            echo "Required secrets: ASC_KEY_ID, ASC_ISSUER_ID, ASC_PRIVATE_KEY"
            echo "The API key must have Admin access for App Store distribution export."
            exit 1
          fi

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s\n' "$ASC_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ID=$ASC_KEY_ID" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID=$ASC_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            > .build/resolve-packages.log 2>&1

      - name: Archive app
        id: archive
        run: |
          set -euo pipefail
          set +e
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            > .build/archive.log 2>&1
          ARCHIVE_EXIT=$?
          set -e
          if [ "$ARCHIVE_EXIT" -ne 0 ]; then
            echo "====== ARCHIVE FAILED (exit $ARCHIVE_EXIT) ======"
            grep -E "error:|warning:|No Accounts|provisioning profile|Signing" .build/archive.log || true
            tail -n 120 .build/archive.log || true
            exit "$ARCHIVE_EXIT"
          fi
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "====== ARCHIVE FAILED: .xcarchive not created ======"
            ls -la .build/ || true
            tail -n 120 .build/archive.log || true
            exit 1
          fi
          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "====== ARCHIVE FAILED: .app not found in archive ======"
            find "$ARCHIVE_PATH" -maxdepth 4 -type d || true
            exit 1
          fi
          echo "Archive signing (informational — distribution signing happens at export):"
          codesign -dvvv "$APP_PATH" 2>&1 | tee .build/codesign-archive.log
          if [ -f "$APP_PATH/embedded.mobileprovision" ]; then
            security cms -D -i "$APP_PATH/embedded.mobileprovision" > .build/embedded-profile-archive.plist
            echo "Embedded profile: $(/usr/libexec/PlistBuddy -c 'Print :Name' .build/embedded-profile-archive.plist)"
          fi
          echo "archive-path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "Archive succeeded: $ARCHIVE_PATH"

      - name: Export App Store IPA
        id: export
        run: |
          set -euo pipefail
          ARCHIVE_PATH="${{ steps.archive.outputs.archive-path }}"
          if [ -z "$ARCHIVE_PATH" ] || [ ! -d "$ARCHIVE_PATH" ]; then
            echo "====== EXPORT FAILED: archive missing ======"
            exit 1
          fi
          mkdir -p "$EXPORT_PATH"
          set +e
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            -allowProvisioningUpdates \
            > .build/export.log 2>&1
          EXPORT_EXIT=$?
          set -e
          if [ "$EXPORT_EXIT" -ne 0 ]; then
            echo "====== EXPORT FAILED (exit $EXPORT_EXIT) ======"
            grep -E "error:|warning:|Signing|provisioning profile|Cloud signing" .build/export.log || true
            tail -n 120 .build/export.log || true
            echo
            echo "If you see 'Cloud signing permission error', your App Store Connect API key"
            echo "must have the Admin role for distribution export."
            exit "$EXPORT_EXIT"
          fi
          IPA="$(find "$EXPORT_PATH" -name '*.ipa' -print -quit)"
          if [ -z "$IPA" ]; then
            echo "====== EXPORT FAILED: IPA not found ======"
            ls -la "$EXPORT_PATH" || true
            exit 1
          fi
          WORKDIR="$(mktemp -d)"
          trap 'rm -rf "$WORKDIR"' EXIT
          unzip -q "$IPA" -d "$WORKDIR"
          EXPORTED_APP="$(find "$WORKDIR" -path '*/Payload/*.app' -print -quit)"
          if [ -z "$EXPORTED_APP" ]; then
            echo "====== EXPORT FAILED: .app missing inside IPA ======"
            exit 1
          fi
          echo "Exported IPA signing:"
          codesign -dvvv "$EXPORTED_APP" 2>&1 | tee .build/codesign-export.log
          if ! grep -qi "Authority=Apple Distribution" .build/codesign-export.log; then
            echo "====== EXPORT FAILED: IPA is not signed with Apple Distribution ======"
            grep -i "Authority=" .build/codesign-export.log || true
            exit 1
          fi
          echo "ipa-path=$IPA" >> "$GITHUB_OUTPUT"
          echo "Exported IPA: $IPA"

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.export.outputs.ipa-path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            .build/archive.log
            .build/export.log
            .build/codesign-archive.log
            .build/codesign-export.log
            .build/resolve-packages.log
          if-no-files-found: warn
