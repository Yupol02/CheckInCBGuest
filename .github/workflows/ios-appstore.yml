name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  BUNDLE_ID: com.checkingcbguests.CheckingCBGuestsI-os
  DEVELOPMENT_TEAM: 46W827A36A

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Configure App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s\n' "$ASC_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ID=$ASC_KEY_ID" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_ISSUER_ID=$ASC_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Import code signing certificate
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Download App Store provisioning profile
        uses: Apple-Actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Build, archive and export IPA
        id: build
        uses: Apple-Actions/xcodebuild@v1
        with:
          project: ${{ env.PROJECT_PATH }}
          scheme: ${{ env.SCHEME }}
          sdk: iphoneos
          destination: generic/platform=iOS
          action: archive
          archive-path: .build/CheckingCBGuests.xcarchive
          export-options-plist: ios/ExportOptions.plist
          build-settings: |
            DEVELOPMENT_TEAM=${{ env.DEVELOPMENT_TEAM }}
            CODE_SIGN_STYLE=Automatic
          extra-arguments: -allowProvisioningUpdates
          zip-result-bundle: true

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.build.outputs.ipa-path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: .build/*.log
          if-no-files-found: ignore
