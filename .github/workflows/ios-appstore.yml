name: iOS App Store Upload

on:
  workflow_dispatch:

env:
  PROJECT_PATH: ios/CheckingCBGuestsİos.xcodeproj
  SCHEME: CheckingCBGuestsİos
  BUNDLE_ID: com.checkingcbguests.CheckingCBGuestsI-os
  DEVELOPMENT_TEAM: 46W827A36A
  ARCHIVE_PATH: .build/CheckingCBGuests.xcarchive
  EXPORT_PATH: .build/export

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: mkdir -p .build

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate required secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY BUILD_CERTIFICATE_BASE64 P12_PASSWORD; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            cat <<'EOF'

          Required GitHub secrets:
            ASC_KEY_ID, ASC_ISSUER_ID, ASC_PRIVATE_KEY  — App Store Connect API (upload + profile download)
            BUILD_CERTIFICATE_BASE64                    — Apple Distribution .p12 as base64
            P12_PASSWORD                                — .p12 export password

          Setup on your Mac:
            1. Keychain Access → My Certificates → Apple Distribution → Export as .p12
            2. base64 -i distribution.p12 | pbcopy   → paste into BUILD_CERTIFICATE_BASE64
            3. developer.apple.com → Profiles → App Store profile for bundle id
               (must include the same Distribution certificate)

          Cloud signing (Admin API) is NOT used — local certificate signing avoids export errors.
          EOF
            exit 1
          fi

      - name: Import distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="ci-keychain-password"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > .build/distribution.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import .build/distribution.p12 \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Installed signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | tee .build/identities.log
          if ! grep -q "Apple Distribution" .build/identities.log; then
            echo "::error::No Apple Distribution identity found in imported .p12"
            exit 1
          fi

      - name: Download App Store provisioning profile
        id: provisioning
        uses: Apple-Actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Configure manual signing on app target only
        id: signing
        env:
          PROFILES_JSON: ${{ steps.provisioning.outputs.profiles }}
          PROJECT_PATH: ${{ env.PROJECT_PATH }}
          DEVELOPMENT_TEAM: ${{ env.DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          echo "Downloaded profiles: $PROFILES_JSON"
          PROFILE_NAME="$(printf '%s' "$PROFILES_JSON" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          assert data, "No App Store provisioning profile found for bundle id"
          manual = [p for p in data if "Team Store" not in p.get("name", "")]
          chosen = manual[0] if manual else data[0]
          print(chosen["name"])
          ')"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          export PROFILE_NAME
          gem install xcodeproj -N
          ruby <<'RUBY'
          require "xcodeproj"

          project = Xcodeproj::Project.open(ENV.fetch("PROJECT_PATH"))
          app_target = project.targets.find { |target| target.product_type == "com.apple.product-type.application" }
          raise "Application target not found" unless app_target

          app_target.build_configurations.each do |config|
            next unless config.name == "Release"

            config.build_settings["CODE_SIGN_STYLE"] = "Manual"
            config.build_settings["CODE_SIGN_IDENTITY"] = "Apple Distribution"
            config.build_settings["CODE_SIGN_IDENTITY[sdk=iphoneos*]"] = "Apple Distribution"
            config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ENV.fetch("PROFILE_NAME")
            config.build_settings["DEVELOPMENT_TEAM"] = ENV.fetch("DEVELOPMENT_TEAM")
            config.build_settings.delete("PROVISIONING_PROFILE")
          end

          project.targets.each do |target|
            next if target.product_type == "com.apple.product-type.application"

            target.build_configurations.each do |config|
              config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
            end
          end

          project.save
          RUBY
          echo "Using provisioning profile: $PROFILE_NAME"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" | tee .build/profiles.log || true

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            > .build/resolve-packages.log 2>&1

      - name: Archive app
        id: archive
        run: |
          set -euo pipefail
          set +e
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            > .build/archive.log 2>&1
          ARCHIVE_EXIT=$?
          set -e
          if [ "$ARCHIVE_EXIT" -ne 0 ]; then
            echo "====== ARCHIVE FAILED (exit $ARCHIVE_EXIT) ======"
            grep -E "error:|warning:|provisioning profile|Signing" .build/archive.log || true
            tail -n 120 .build/archive.log || true
            exit "$ARCHIVE_EXIT"
          fi
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "====== ARCHIVE FAILED: .xcarchive not created ======"
            exit 1
          fi
          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "====== ARCHIVE FAILED: .app not found ======"
            exit 1
          fi
          echo "Archive signing:"
          codesign -dvvv "$APP_PATH" 2>&1 | tee .build/codesign-archive.log
          if [ -f "$APP_PATH/embedded.mobileprovision" ]; then
            security cms -D -i "$APP_PATH/embedded.mobileprovision" > .build/embedded-profile.plist
            echo "Profile: $(/usr/libexec/PlistBuddy -c 'Print :Name' .build/embedded-profile.plist)"
          fi
          if ! grep -qiE "Authority=Apple Distribution|Authority=iPhone Distribution" .build/codesign-archive.log; then
            echo "====== ARCHIVE FAILED: not signed with Distribution certificate ======"
            grep -i "Authority=" .build/codesign-archive.log || true
            exit 1
          fi
          echo "archive-path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Archive succeeded"

      - name: Package IPA
        id: export
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.archive.outputs.app-path }}"
          mkdir -p "$EXPORT_PATH"
          codesign --verify --deep --strict "$APP_PATH" > .build/package.log 2>&1
          APP_NAME="$(basename "$APP_PATH")"
          IPA_PATH="$EXPORT_PATH/${APP_NAME%.app}.ipa"
          WORKDIR="$(mktemp -d)"
          trap 'rm -rf "$WORKDIR"' EXIT
          mkdir -p "$WORKDIR/Payload"
          ditto "$APP_PATH" "$WORKDIR/Payload/$APP_NAME"
          (cd "$WORKDIR" && zip -yr "$OLDPWD/$IPA_PATH" Payload > "$OLDPWD/.build/zip.log" 2>&1)
          echo "ipa-path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Packaged IPA: $IPA_PATH"

      - name: Upload to App Store Connect
        uses: Apple-Actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.export.outputs.ipa-path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            .build/archive.log
            .build/export.log
            .build/codesign-archive.log
            .build/identities.log
            .build/profiles.log
            .build/resolve-packages.log
          if-no-files-found: warn

      - name: Cleanup signing keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
